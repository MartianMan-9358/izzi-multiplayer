<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Izzi Multiplayer | RTDB Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- index.html -->
<body>
    <!-- 1. The Hamburger Button (Hidden by default, shown for Host) -->
    <div id="menu-toggle" class="hidden">☰</div>

    <div class="app-container">
        <!-- 2. The Sidebar (Off-canvas) -->
        <aside id="sidebar" class="sidebar">
            <div id="close-sidebar">×</div>
            <header>
                <h2>Host Settings</h2>
            </header>

            <section id="host-controls">
                <div class="control-group">
                    <label>Grid Size</label>
                    <div class="input-row">
                        <input type="number" id="inputRows" value="8" min="1" max="12">
                        <span>×</span>
                        <input type="number" id="inputCols" value="8" min="1" max="12">
                    </div>
                </div>
            
                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="allowExcluded">
                        Allow Excluded (X) Tiles
                    </label>
                </div>
            
                <div class="control-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="solutionOnly">
                        Solution Tiles Only
                    </label>
                </div>
            
                <div class="button-stack">
                    <button id="btnBuild" class="btn-primary">Build New Board</button>
                    <button id="btnClear" class="btn-primary">Reset Current Board</button>
                    <button id="btnNuke" class="btn-danger" style="margin-top: 20px; opacity: 0.7;">
                        NUKE DATABASE
                </div>
            </section>
                </div>
            </section>

        </aside>

        <!-- 3. Main Viewport -->
        <main class="game-viewport">
            <canvas id="gameCanvas"></canvas>
            <div id="win-overlay" class="hidden">
                <h2>PUZZLE SOLVED!</h2>
            </div>
        </main>
    </div>
